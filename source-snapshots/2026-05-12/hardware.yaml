# ABOUTME: Machine-readable hardware accelerator specs for serving physics derivations.
# ABOUTME: Captures HBM capacity, bandwidth, interconnect, TDP, and precision for inference sizing.
#
# These are product-page specs, not measured serving goodput numbers.
# Body prose should use specs as sizing inputs; appendix carries the full table.
# Pair with local goodput traces before making architecture claims.

snapshot_date: "2026-05-12"
schema_version: "1.0"

accelerators:

  # --- NVIDIA ---

  - accelerator: NVIDIA H100 SXM
    snapshot_id: nvidia-h100-sxm-20260512
    accessed_at: "2026-05-12"
    source_url: https://www.nvidia.com/en-us/data-center/h100/
    source_type: official_hardware_spec
    volatility: medium
    refresh_before: monthly
    used_by_example:
      - support-rag-answer-drafting.audit.v1
    body_claim_allowed: true  # as sizing input with caveats
    hbm_type: HBM3
    hbm_gb: 80
    hbm_bandwidth_tbps: 3.35
    interconnect: NVLink 4th gen
    nvlink_bandwidth_gbps: 900  # bidirectional
    tdp_watts: 700
    precision_surface:
      - FP64
      - TF32
      - FP16
      - BF16
      - FP8
      - INT8
    mig_support: true
    scale_up_topology: "8-GPU NVLink domain; NVSwitch"
    notes: >
      H100 SXM is the baseline for most 2024-2025 inference deployments.
      80 GB HBM3 is the binding constraint for large models without tensor parallelism.
      FP8 support enables ~2x KV cache density vs FP16.

  - accelerator: NVIDIA H200 SXM
    snapshot_id: nvidia-h200-sxm-20260512
    accessed_at: "2026-05-12"
    source_url: https://www.nvidia.com/en-us/data-center/h200/
    source_type: official_hardware_spec
    volatility: medium
    refresh_before: monthly
