    hbm_type: HBM3e
    hbm_gb: 141
    hbm_bandwidth_tbps: 4.8
    interconnect: NVLink 4th gen
    nvlink_bandwidth_gbps: 900
    tdp_watts: 700
    precision_surface:
      - FP64
      - TF32
      - FP16
      - BF16
      - FP8
      - INT8
    mig_support: true
    scale_up_topology: "8-GPU NVLink domain; NVSwitch"
    notes: >
      H200 provides ~76% more HBM capacity and ~43% more bandwidth vs H100 SXM.
      Key for long-context KV cache sizing derivations. Same NVLink topology.

