      - FP16
      - INT8
      - INT4
    scale_up_topology: "single PCIe card; no NVLink"
    notes: >
      T4 is relevant as edge/constraint example from QSR deployment.
      16 GB GDDR6 limits model size and KV cache. 70W TDP means thermal
      throttling at 83C is a real production constraint.
      See Sohail's public post on T4 thermal throttling.
