# ABOUTME: Machine-readable prompt-cache semantics snapshot for Production Inference Economics.
# ABOUTME: Captures TTL, prefix rules, write/read accounting, scope, and cache-breaking events per provider.
#
# Each row represents one provider's cache implementation as documented on the accessed date.
# Body prose should teach the mechanism; appendix should carry the exact parameters.

snapshot_date: "2026-05-12"
schema_version: "1.0"

cache_providers:

  - provider: OpenAI
    snapshot_id: openai-cache-semantics-20260512
    accessed_at: "2026-05-12"
    source_url: https://developers.openai.com/api/docs/guides/prompt-caching
    source_type: official_docs
    volatility: high
    refresh_before: pre_caching_chapter
    used_by_example:
      - support-answer.trace-margin.v1
      - coding-agent.lifecycle.v1
    body_claim_allowed: true  # mechanism only, not exact thresholds
    cache_supported: true
    automatic: true
    explicit_key_supported: true  # prompt_cache_key in some contexts
    min_prefix_tokens: 1024
    matching_rule: exact_prefix
    ttl: "5-10m reported; not contractually guaranteed"
    cache_scope: org  # inferred from docs
    write_accounting: "no separate cache write charge"
    read_accounting: "cached_tokens in usage; discounted input rate"
    read_discount: "50% of input price"
    batch_stack_behavior: unknown  # not clearly documented
    usage_fields:
      - usage.prompt_tokens_details.cached_tokens
    cache_breaking_events:
      - "any change to prefix content"
      - "tool definition changes"
      - "image content changes"
      - "model change"
      - "hot-prefix overflow reducing cache effectiveness"
    notes: >
      OpenAI caching is largely automatic. Static content should precede variable
      content. The prompt_cache_key feature enables more explicit control.
      Cache routing uses prefix hashes internally.

  - provider: Anthropic
    snapshot_id: anthropic-cache-semantics-20260512
    accessed_at: "2026-05-12"
    source_url: https://platform.claude.com/docs/en/build-with-claude/prompt-caching
    source_type: official_docs
    volatility: high
    refresh_before: pre_caching_chapter
    used_by_example:
      - coding-agent.lifecycle.v1
      - support-answer.trace-margin.v1
    body_claim_allowed: true  # mechanism yes; exact prices as snapshot
    cache_supported: true
    automatic: true  # can also be explicit
    explicit_key_supported: false
    min_prefix_tokens: "model-dependent; varies by model"
    matching_rule: exact_prefix
    ttl_default: 5m
    ttl_extended: 1h  # costs more
    cache_scope: workspace  # workspace isolation documented
    write_accounting: "cache_creation_input_tokens at write premium"
    read_accounting: "cache_read_input_tokens at read discount"
    write_premium_5m: "1.25x base input"  # $3.75 vs $3.00 for Sonnet 4.6
    write_premium_1h: "2.0x base input"   # $6.00 vs $3.00 for Sonnet 4.6
    read_discount: "0.1x base input"      # $0.30 vs $3.00 for Sonnet 4.6
    batch_stack_behavior: stacks  # batch discount applies to cache categories
    usage_fields:
      - cache_creation_input_tokens
      - cache_read_input_tokens
      - input_tokens
      - output_tokens
    cache_hierarchy: "tools -> system -> messages"
    cache_breaking_events:
      - "tool definition changes invalidate entire cache"
      - "web search/citation changes affect system/message cache"
      - "timestamp in system prompt"
      - "non-deterministic tool order"
      - "tool parameter/schema changes"
      - "model change"
      - "effort/speed setting change"
      - "compaction boundary"
    notes: >
      Anthropic has the most explicit cache write/read accounting. Claude Code
      treats cache hit-rate regression as an incident. Cache-safe compaction
      forks with the same parent prefix. Best provider for cache economics examples.

  - provider: Google
    snapshot_id: google-cache-semantics-20260512
    accessed_at: "2026-05-12"
    source_url: https://ai.google.dev/gemini-api/docs/caching
    source_type: official_docs
    volatility: high
    refresh_before: pre_caching_chapter
    used_by_example:
      - coding-agent.lifecycle.v1
    body_claim_allowed: true  # mechanism only
    cache_supported: true
    automatic: true  # implicit caching for eligible prompts
    explicit_key_supported: true  # explicit cached-content lifecycle
    min_prefix_tokens: "model-specific thresholds"
    matching_rule: exact_prefix  # for implicit; checkpoint for explicit
    ttl: "configurable for explicit; system-managed for implicit"
    cache_scope: project  # inferred
    write_accounting: "cache creation at input rate or higher"
    read_accounting: "cached tokens at reduced rate"
    storage_rent: true  # per-token-hour charge for explicit caches
    storage_rate_per_mtok_hour: null  # refresh from pricing
    usage_fields:
      - cached_content_token_count
      - prompt_token_count
    cache_breaking_events:
      - "content change in cached prefix"
      - "cache expiry"
      - "model version change"
    notes: >
      Google uniquely charges storage rent for explicit context caches.
      This adds a time dimension to cache break-even that other providers lack.
      Implicit caching is automatic and free of storage charges.

  - provider: AWS Bedrock
    snapshot_id: bedrock-cache-semantics-20260512
    accessed_at: "2026-05-12"
    source_url: https://docs.aws.amazon.com/bedrock/latest/userguide/prompt-caching.html
    source_type: official_docs
    volatility: high
    refresh_before: pre_caching_chapter
    used_by_example: []
    body_claim_allowed: true  # mechanism only
    cache_supported: true
    automatic: false  # uses cache checkpoints
    explicit_key_supported: true
    min_prefix_tokens: "varies by model"
    matching_rule: checkpoint
    ttl: "varies; not always disclosed"
    cache_scope: account  # account-level within region
    write_accounting: "cacheWriteInputTokens"
    read_accounting: "cacheReadInputTokens"
    usage_fields:
      - cacheReadInputTokens
      - cacheWriteInputTokens
    cache_breaking_events:
      - "checkpoint content change"
      - "cross-region inference may not share cache"
    notes: >
      Bedrock uses checkpoint-based caching. Field naming has inconsistencies
      between user guide and API reference docs. Always quote exact source.

  - provider: Azure OpenAI
    snapshot_id: azure-cache-semantics-20260512
    accessed_at: "2026-05-12"
    source_url: https://learn.microsoft.com/en-us/azure/foundry/openai/how-to/prompt-caching
    source_type: official_docs
    volatility: high
    refresh_before: pre_caching_chapter
    used_by_example: []
    body_claim_allowed: true  # mechanism only
    cache_supported: true
    automatic: true
    explicit_key_supported: true  # prompt_cache_key supported
    min_prefix_tokens: 1024
    matching_rule: exact_prefix
    ttl: "in-memory and extended retention options"
    cache_scope: deployment  # within deployment
    read_discount: "standard: 50% of input; provisioned: varies"
    usage_fields:
      - cached_tokens
    cache_breaking_events:
      - "prefix content change"
      - "deployment model version change"
    notes: >
      Azure extends OpenAI caching with prompt_cache_key and extended retention.
      Provisioned throughput has different discount semantics.
      Data residency compatibility is documented.

  - provider: Groq
    snapshot_id: groq-cache-semantics-20260512
    accessed_at: "2026-05-12"
    source_url: https://console.groq.com/docs/prompt-caching
    source_type: official_docs
    volatility: high
    refresh_before: pre_caching_chapter
    used_by_example: []
    body_claim_allowed: true  # mechanism only
    cache_supported: true
    automatic: true  # no manual cache management
    explicit_key_supported: false
    min_prefix_tokens: null  # not disclosed
    matching_rule: exact_prefix  # inferred
    ttl: unknown
    cache_scope: unknown
    read_discount: "50% of input price"
    batch_stack_behavior: does_not_stack  # cache discount does not stack with batch
    usage_fields:
      - cached_tokens  # inferred
    cache_breaking_events:
      - "prefix content change"
    notes: >
      Groq cache discount does not stack with batch discount. Important for
      examples comparing batch+cache economics across providers.

  - provider: Mistral
    snapshot_id: mistral-cache-semantics-20260512
    accessed_at: "2026-05-12"
    source_url: https://docs.mistral.ai/studio-api/conversations/advanced/prompt-caching
    source_type: official_docs
    volatility: high
    refresh_before: pre_caching_chapter
    used_by_example: []
    body_claim_allowed: true  # mechanism only
    cache_supported: true
    automatic: true
    explicit_key_supported: true  # prompt_cache_key
    min_prefix_tokens: null
    matching_rule: exact_prefix  # inferred from docs
    ttl: unknown  # not clearly disclosed
    read_discount: "discounted cached prompt tokens"
    usage_fields:
      - prompt_cache_key
      - cached prompt tokens
    cache_breaking_events:
      - "prefix content change"
      - "prompt_cache_key helps but does not guarantee hit"
    notes: >
      Mistral supports prompt_cache_key for more explicit cache control.
      Exact TTL and scope details are less documented than OpenAI/Anthropic.
