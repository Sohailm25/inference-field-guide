# Throughput assumptions for break-even calculations
# These are for 70B FP8 models with vLLM continuous batching
throughput_assumptions:
  h100_70b_fp8:
    theoretical_max_tps: 1500    # tokens/sec at high batch utilization
    realistic_utilization: 0.40  # 30-50% of theoretical in production
    effective_tps: 600           # theoretical * utilization
    notes: "Based on Spheron benchmark; 40% utilization is midpoint of 30-50% production range from industry reports"
